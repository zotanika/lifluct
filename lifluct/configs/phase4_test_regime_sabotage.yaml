# Phase 4 test regime: targeted sabotage / burst toxicity stress.
# This is a stress case, not a default market assumption.
seed: 104
num_steps: 500
epoch_length: 100
baseline_type: lifluct_multi_cell
initial_reserve_a: 1000.0
initial_reserve_b: 100000.0
initial_price: 100.0
tvl_target: 200000.0
sigma: 0.03
dt: 1.0
oracle_mode: lagged
oracle_lag_steps: 2
oracle_observation_noise: 0.01
attribution_mode: observed_spot
q_trade: 0.20
max_trade_fraction_of_tvl: 0.03
arbitrage_threshold: 0.0005
toxic_trade_probability: 0.60
num_toxic_attempts_per_step: 3
toxic_mode: burst_toxicity
toxic_burst_probability: 1.0
toxic_burst_start_step: 150
toxic_burst_end_step: 300
sabotage_target_cell_mode: weakest_fitness
num_cells: 8
user_routing_mode: weighted_random
toxic_routing_mode: cheapest_active
p_best: 0.80
use_dynamic_fee: true
use_turgor: true
fee_max_global: 0.50
s_base: 0.90
f_min: 0.003
mu: 0.15
tau: 0.002
beta: 0.20
gene_init_f_min_min: 0.0010
gene_init_f_min_max: 0.0050
gene_init_mu_min: 0.05
gene_init_mu_max: 0.50
gene_init_tau_min: 0.0005
gene_init_tau_max: 0.0050
gene_init_beta_min: 0.00
gene_init_beta_max: 0.50
f_min_min: 0.0005
f_min_max: 0.0100
mu_min: 0.00
mu_max: 25.00
tau_min: 0.0001
tau_max: 0.0200
beta_min: 0.00
beta_max: 5.00
fitness_mode: full_with_inactivity_penalty
fitness_lambda: 1.00
fitness_gamma: 0.60
fitness_omega: 1.50
min_volume_threshold: 5000.0
inactivity_penalty: 0.05
epsilon: 1.0e-12
enable_evolution: true
selection_fraction: 0.50
elite_count: 1
parent_selection_mode: uniform
mutation_mode: multiplicative_gaussian
mutation_sigma_f_min: 0.10
mutation_sigma_mu: 0.20
mutation_sigma_tau: 0.10
mutation_sigma_beta: 0.20
lysis_mode: hard
kappa: 2.5
soft_lysis_penalty: 0.05
